<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anax Developments</title>

<style>

/* =========================
VIDEO BACKGROUND
========================= */

.videoBackground{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.videoOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.25);
    z-index:-1;
}

/* =========================
GLOBAL
========================= */

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    color:white;
}

/* =========================
ANIMATIONS
========================= */

.fadeIn{
    animation:fadeIn 1.5s ease forwards;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes floatQR{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0px);}
}

/* =========================
HEADER
========================= */

.header{
    width:100%;
    text-align:center;
    padding:15px 0 15px 0;

    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    /* background: rgba(0,0,0,0.25); */
    border-bottom: 1px solid rgba(255,255,255,0.15);

    position:sticky;
    top:0;
}
.logo{
    width:250px;
}

/* =========================
MAIN LAYOUT
========================= */

.main{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* =========================
QR SECTION
========================= */

.qrSection{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top: 200px;
}

.qr{
    width:640px;
    animation:floatQR 6s ease-in-out infinite;
}

/* =========================
TEXT AREA
========================= */

.bottomSection{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    margin-bottom:120px;
}

.title{
    font-size:35px;
    margin:50px 0;
    letter-spacing:4px;
}

/* =========================
BUTTON
========================= */

.button{
    background:black;
    color:white;
    border:none;
    padding:18px 40px;
    border-radius:10px;
    cursor:pointer;
    font-size:32px;
    transition:all 0.3s ease;
}

.button:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* =========================
FORM POPUP
========================= */

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.formBox{
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.3);
    padding:40px;
    border-radius:15px;
    width:320px;
    color:white;
}

.formBox h3{
    margin-top:0;
}

.formBox input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid rgba(255,255,255,0.4);
    background:rgba(255,255,255,0.1);
    color:white;
    border-radius:6px;
}

.submitBtn{
    width:100%;
    padding:12px;
    border:none;
    background:#1e4f4c;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

</style>
</head>


<body>

<!-- VIDEO BACKGROUND -->

<video autoplay muted loop playsinline class="videoBackground">
<source src="Background.mp4" type="video/mp4">
</video>

<div class="videoOverlay"></div>

<!-- HEADER -->

<div class="header">
<img src="logo.png" class="logo fadeIn">
</div>


<!-- MAIN CONTENT -->

<div class="main">

<div class="qrSection">
<img src="qr.png" class="qr">
</div>

<div class="bottomSection">

<div class="title">SUBSCRIBE FOR LAUNCHES</div>

<button class="button" onclick="openForm()">Or Register Here</button>

</div>

</div>


<!-- FORM -->

<div class="overlay" id="formOverlay">

<div class="formBox">

<h3>Register</h3>

<input type="text" placeholder="Name" id="name">
<input type="email" placeholder="Email" id="email">
<input type="tel" placeholder="Phone" id="phone">

<button class="submitBtn" onclick="submitForm()">Submit</button>

</div>

</div>


<script>

function openForm(){
    document.getElementById("formOverlay").style.display="flex";
}

function submitForm(){

    let name=document.getElementById("name").value
    let email=document.getElementById("email").value
    let phone=document.getElementById("phone").value

    console.log("Form submitted:",name,email,phone)

    alert("Thank you for registering!")

    document.getElementById("formOverlay").style.display="none"
}

</script>

</body>
</html>
