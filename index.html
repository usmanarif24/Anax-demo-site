<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anax Developments</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f2f2f2;
}

/* HEADER */

.header{
    width:100%;
    text-align:center;
    padding:30px 0 10px 0;
}

.logo{
    width:280px;
}

/* MAIN LAYOUT */

.main{
    height:calc(100vh - 120px);
    display:flex;
    flex-direction:column;
}

/* QR AREA */

.qrSection{
    flex:3; /* roughly 75% */
    display:flex;
    justify-content:center;
    align-items:center;
}

.qr{
    width:260px;
}

/* TEXT AREA */

.bottomSection{
    flex:1; /* roughly 25% */
    text-align:center;
}

.title{
    font-size:22px;
    margin-bottom:15px;
}

.button{
    background:#1e4f4c;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.button:hover{
    opacity:0.9;
}


/* FORM POPUP */

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.formBox{
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
}

.formBox input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

.submitBtn{
    width:100%;
    padding:12px;
    border:none;
    background:#1e4f4c;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

</style>
</head>


<body>

<!-- HEADER -->

<div class="header">
<img src="logo.png" class="logo">
</div>


<div class="main">

<div class="qrSection">
<img src="qr.png" class="qr">
</div>

<div class="bottomSection">

<div class="title">Subscribe for launches</div>

<button class="button" onclick="openForm()">or register here</button>

</div>

</div>


<!-- FORM -->

<div class="overlay" id="formOverlay">

<div class="formBox">

<h3>Register</h3>

<input type="text" placeholder="Name" id="name">
<input type="email" placeholder="Email" id="email">
<input type="tel" placeholder="Phone" id="phone">

<button class="submitBtn" onclick="submitForm()">Submit</button>

</div>

</div>


<script>

function openForm(){
    document.getElementById("formOverlay").style.display="flex";
}

function submitForm(){

    let name=document.getElementById("name").value
    let email=document.getElementById("email").value
    let phone=document.getElementById("phone").value

    console.log("Form submitted:",name,email,phone)

    alert("Thank you for registering!")

    document.getElementById("formOverlay").style.display="none"
}

</script>

</body>
</html>
