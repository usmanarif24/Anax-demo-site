<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anax Developments</title>

<style>

/* VIDEO BACKGROUND */

.videoBackground{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    /* height:100%; */
    object-fit:cover;
    z-index:-1;
}

.videoOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);
    z-index:-1;
}

/* make content readable */

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    color:white;
}

/* HEADER */

.header{
    width:100%;
    text-align:center;
    padding:30px 0 10px 0;
}

.logo{
    width:200px;
}

/* MAIN LAYOUT */

.main{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* QR AREA */

.qrSection{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:50px;
    margin-top: 50px;
}

.qr{
    width: 640px;
}

/* TEXT AREA */

.bottomSection{
    padding-bottom: 500px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.title{
    font-size:35px;
    margin-bottom:50px;
    margin-top: 50px;
}

.button{
    background:#1e4f4c;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:35px;
}

.button:hover{
    opacity:0.9;
}


/* FORM POPUP */

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.formBox{
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
}

.formBox input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

.submitBtn{
    width:100%;
    padding:12px;
    border:none;
    background:#1e4f4c;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

</style>
</head>


<body>

    <video autoplay muted loop playsinline class="videoBackground">
    <source src="Background.mp4" type="video/mp4">
</video>

<div class="videoOverlay"></div>

<!-- HEADER -->

<div class="header">
<img src="logo.png" class="logo">
</div>


<div class="main">

<div class="qrSection">
<img src="qr.png" class="qr">
</div>

<div class="bottomSection">

<div class="title">SUBSCRIBE FOR LAUNCHES</div>

<button class="button" onclick="openForm()">or register here</button>

</div>

</div>


<!-- FORM -->

<div class="overlay" id="formOverlay">

<div class="formBox">

<h3>Register</h3>

<input type="text" placeholder="Name" id="name">
<input type="email" placeholder="Email" id="email">
<input type="tel" placeholder="Phone" id="phone">

<button class="submitBtn" onclick="submitForm()">Submit</button>

</div>

</div>


<script>

function openForm(){
    document.getElementById("formOverlay").style.display="flex";
}

function submitForm(){

    let name=document.getElementById("name").value
    let email=document.getElementById("email").value
    let phone=document.getElementById("phone").value

    console.log("Form submitted:",name,email,phone)

    alert("Thank you for registering!")

    document.getElementById("formOverlay").style.display="none"
}

</script>

</body>
</html>
